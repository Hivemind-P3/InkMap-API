spring.application.name=InkMap-API
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

server.port=8080

server.servlet.context-path=/api/v1

spring.datasource.url=jdbc:postgresql://localhost:5432/inkmap-db
spring.datasource.username=inkmap-user
spring.datasource.password=inkmap-password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
google.client.id=1073297741418-pmie1q24e9nk3vmb6nnbrmj27agol8t3.apps.googleusercontent.com

# JWT — change the secret in production (must be at least 32 characters)
jwt.secret=inkmap-default-secret-key-change-in-production!
jwt.expiration=86400000